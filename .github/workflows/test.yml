name: Independent Minds EDU — Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test -- --reporter=verbose
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/

  e2e-tests:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Check if E2E secrets are configured
        id: check-secrets
        run: |
          if [ -z "${{ secrets.PLAYWRIGHT_BASE_URL }}" ]; then
            echo "PLAYWRIGHT_BASE_URL not set — skipping E2E tests"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v4
        if: steps.check-secrets.outputs.skip == 'false'
      - uses: actions/setup-node@v4
        if: steps.check-secrets.outputs.skip == 'false'
        with:
          node-version: 20
          cache: npm
      - run: npm ci
        if: steps.check-secrets.outputs.skip == 'false'
      - run: npx playwright install --with-deps chromium
        if: steps.check-secrets.outputs.skip == 'false'
      - name: Run Playwright tests
        if: steps.check-secrets.outputs.skip == 'false'
        run: npm run test:e2e
        env:
          PLAYWRIGHT_BASE_URL: ${{ secrets.PLAYWRIGHT_BASE_URL }}
          TEST_PARENT_EMAIL: ${{ secrets.TEST_PARENT_EMAIL }}
          TEST_PARENT_PASSWORD: ${{ secrets.TEST_PARENT_PASSWORD }}
          TEST_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL }}
          TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}
          TEST_GUARDIAN_EMAIL: ${{ secrets.TEST_GUARDIAN_EMAIL }}
          TEST_GUARDIAN_PASSWORD: ${{ secrets.TEST_GUARDIAN_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      - uses: actions/upload-artifact@v4
        if: always() && steps.check-secrets.outputs.skip == 'false'
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  db-tests:
    name: Database RLS audit (SQL)
    runs-on: ubuntu-latest
    needs: unit-tests
    environment: db
    steps:
      - name: Check if DB secrets are configured
        id: check-secrets
        run: |
          if [ -z "${{ secrets.DATABASE_URL }}" ]; then
            echo "DATABASE_URL not set — skipping DB tests"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v4
        if: steps.check-secrets.outputs.skip == 'false'
      - name: Run SQL security audit
        if: steps.check-secrets.outputs.skip == 'false'
        run: psql "$DATABASE_URL" -f tests/db/rls/full_security_audit.sql
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  summary:
    name: Test summary
    runs-on: ubuntu-latest
    needs: [unit-tests, e2e-tests, db-tests]
    if: always()
    steps:
      - run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "- Unit tests: ${{ needs.unit-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- E2E tests: ${{ needs.e2e-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- DB tests: ${{ needs.db-tests.result }}" >> $GITHUB_STEP_SUMMARY
