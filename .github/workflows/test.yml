name: Independent Minds EDU — Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Unit tests (Vitest) ──────────────────────────────────
  unit-tests:
    name: Unit tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run Vitest
        run: npx vitest run --reporter=verbose

  # ── E2E tests (Playwright) ──────────────────────────────
  e2e-tests:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test
        env:
          PLAYWRIGHT_BASE_URL:       ${{ secrets.PLAYWRIGHT_BASE_URL }}
          TEST_PARENT_EMAIL:         ${{ secrets.TEST_PARENT_EMAIL }}
          TEST_PARENT_PASSWORD:      ${{ secrets.TEST_PARENT_PASSWORD }}
          TEST_ADMIN_EMAIL:          ${{ secrets.TEST_ADMIN_EMAIL }}
          TEST_ADMIN_PASSWORD:       ${{ secrets.TEST_ADMIN_PASSWORD }}
          TEST_GUARDIAN_EMAIL:       ${{ secrets.TEST_GUARDIAN_EMAIL }}
          TEST_GUARDIAN_PASSWORD:    ${{ secrets.TEST_GUARDIAN_PASSWORD }}
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY:         ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  # ── Database / RLS tests (pgTAP) ────────────────────────
  db-tests:
    name: Database RLS audit (pgTAP)
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Run security audit SQL
        run: |
          psql "${{ secrets.DATABASE_URL }}" -f tests/db/rls/security_audit.sql
          psql "${{ secrets.DATABASE_URL }}" -f tests/db/rls/auth_rls.sql
          psql "${{ secrets.DATABASE_URL }}" -f tests/db/rls/co_guardian_rls.sql
          psql "${{ secrets.DATABASE_URL }}" -f tests/db/functions/has_role.sql
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # ── Summary ─────────────────────────────────────────────
  test-summary:
    name: Test summary
    runs-on: ubuntu-latest
    needs: [unit-tests, e2e-tests, db-tests]
    if: always()
    steps:
      - name: Post summary
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "| Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Unit (Vitest) | ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E (Playwright) | ${{ needs.e2e-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| DB / RLS (pgTAP) | ${{ needs.db-tests.result }} |" >> $GITHUB_STEP_SUMMARY
