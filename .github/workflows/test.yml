name: Independent Minds EDU — Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      retry_attempts:
        description: 'How many times to re-run a failing test suite before giving up'
        required: false
        default: '3'

env:
  # Max attempts for flaky test suites. Override per-run via workflow_dispatch input.
  TEST_RETRY_ATTEMPTS: ${{ github.event.inputs.retry_attempts || '3' }}


jobs:
  unit-tests:
    name: Unit tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Run Vitest with retry
        run: |
          attempts="${TEST_RETRY_ATTEMPTS:-3}"
          n=1
          until [ "$n" -gt "$attempts" ]; do
            echo "::group::Vitest attempt $n / $attempts"
            if npm run test -- --reporter=verbose; then
              echo "::endgroup::"
              echo "✅ Vitest passed on attempt $n"
              exit 0
            fi
            echo "::endgroup::"
            echo "::warning::Vitest failed on attempt $n / $attempts"
            n=$((n+1))
          done
          echo "::error::Vitest failed after $attempts attempts"
          exit 1

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/

  e2e-tests:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Check E2E secrets
        id: secrets-check
        run: |
          if [ -z "$PLAYWRIGHT_URL" ] || [ -z "$SUPABASE_SRK" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
        env:
          PLAYWRIGHT_URL: ${{ secrets.PLAYWRIGHT_BASE_URL }}
          SUPABASE_SRK: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Skip E2E (no secrets)
        if: steps.secrets-check.outputs.skip == 'true'
        run: echo "Skipping E2E tests — secrets not configured"

      - uses: actions/checkout@v4
        if: steps.secrets-check.outputs.skip == 'false'
      - uses: actions/setup-node@v4
        if: steps.secrets-check.outputs.skip == 'false'
        with:
          node-version: 20
          cache: npm
      - run: npm ci
        if: steps.secrets-check.outputs.skip == 'false'
      - run: npx playwright install --with-deps chromium
        if: steps.secrets-check.outputs.skip == 'false'
      - name: Run Playwright tests with retry
        if: steps.secrets-check.outputs.skip == 'false'
        run: |
          attempts="${TEST_RETRY_ATTEMPTS:-3}"
          n=1
          until [ "$n" -gt "$attempts" ]; do
            echo "::group::Playwright attempt $n / $attempts"
            if npm run test:e2e -- --reporter=list; then
              echo "::endgroup::"
              echo "✅ Playwright passed on attempt $n"
              exit 0
            fi
            echo "::endgroup::"
            echo "::warning::Playwright failed on attempt $n / $attempts"
            n=$((n+1))
          done
          echo "::error::Playwright failed after $attempts attempts"
          exit 1

        env:
          PLAYWRIGHT_BASE_URL: ${{ secrets.PLAYWRIGHT_BASE_URL }}
          TEST_PARENT_EMAIL: ${{ secrets.TEST_PARENT_EMAIL }}
          TEST_PARENT_PASSWORD: ${{ secrets.TEST_PARENT_PASSWORD }}
          TEST_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL }}
          TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}
          TEST_GUARDIAN_EMAIL: ${{ secrets.TEST_GUARDIAN_EMAIL }}
          TEST_GUARDIAN_PASSWORD: ${{ secrets.TEST_GUARDIAN_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      - uses: actions/upload-artifact@v4
        if: always() && steps.secrets-check.outputs.skip == 'false'
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  db-tests:
    name: Database RLS audit (SQL)
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Check if DB secrets are configured
        id: check-secrets
        run: |
          if [ -z "${{ secrets.DATABASE_URL }}" ]; then
            echo "DATABASE_URL not set — skipping DB tests"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v4
        if: steps.check-secrets.outputs.skip == 'false'
      - name: Run SQL security audit
        if: steps.check-secrets.outputs.skip == 'false'
        run: psql "$DATABASE_URL" -f tests/db/rls/full_security_audit.sql
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  summary:
    name: Test summary
    runs-on: ubuntu-latest
    needs: [unit-tests, e2e-tests, db-tests]
    if: always()
    steps:
      - run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "- Unit tests: ${{ needs.unit-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- E2E tests: ${{ needs.e2e-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- DB tests: ${{ needs.db-tests.result }}" >> $GITHUB_STEP_SUMMARY
